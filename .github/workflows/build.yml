name: Build

on:
  push

env:
  PLUGIN_REPO: WorkingRobot/MyDalamudPlugins
  PROJECT_NAME: Craftimizer
  IS_OFFICIAL: ${{true}}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Download Dalamud
        run: |
          wget https://goatcorp.github.io/dalamud-distrib/stg/latest.zip
          unzip latest.zip -d dalamud/
          echo "DALAMUD_HOME=$PWD/dalamud" >> $GITHUB_ENV

      - name: Restore
        run: |
          dotnet restore -r win

      - name: Build
        run: |
          dotnet build --configuration Release --no-restore

      - name: Test
        run: |
          dotnet test --configuration Release --logger "trx;logfilename=results.trx" --logger "html;logfilename=results.html" --logger "console;verbosity=detailed" --no-build --results-directory="TestResults"

      - name: Create Unofficial Builds
        if: ${{env.IS_OFFICIAL}}
        run: python ./.github/create_unofficial.py ${{env.PROJECT_NAME}}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{env.PROJECT_NAME}}
          path: ${{env.PROJECT_NAME}}/bin/x64/Release/${{env.PROJECT_NAME}}
          if-no-files-found: error

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: TestResults
          path: TestResults

      - name: Package Release Zip
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -x
          echo "=== Searching for plugin DLL ==="
          find . -name "${{env.PROJECT_NAME}}.dll" 2>/dev/null
          OUTDIR=$(find . -name "${{env.PROJECT_NAME}}.dll" -not -path "*/obj/*" | head -1 | xargs dirname)
          echo "=== Output dir: $OUTDIR ==="
          ls -la "$OUTDIR"
          cp "$OUTDIR/${{env.PROJECT_NAME}}.dll" "$OUTDIR/CraftimizerFork.dll"
          python3 -c "
import json
with open('$OUTDIR/${{env.PROJECT_NAME}}.json') as f: d = json.load(f)
d['InternalName'] = 'CraftimizerFork'
d['Name'] = 'Craftimizer (Fork)'
with open('$OUTDIR/CraftimizerFork.json', 'w') as f: json.dump(d, f, indent=4)
"
          rm "$OUTDIR/${{env.PROJECT_NAME}}.dll" "$OUTDIR/${{env.PROJECT_NAME}}.json"
          cd "$OUTDIR" && zip -r "${{github.workspace}}/${{env.PROJECT_NAME}}.zip" .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        id: release
        with:
          files: ${{env.PROJECT_NAME}}.zip


  bench:
    runs-on: windows-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev\"

      - name: Restore
        run: |
          dotnet restore -r win

      - name: Benchmark
        run: |
          dotnet run --configuration Release --project Benchmark -- -e json html github csv -f * -d -m

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: BenchmarkResults
          path: BenchmarkDotNet.Artifacts
